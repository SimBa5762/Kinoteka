<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Кінотека - Фільм</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="body">
    <header>
        <h1 class="logo">Кінотека</h1>
        <div class="user-controls" id="user-controls"></div>
    </header>

    <main>
        <!-- Режим перегляду фільму -->
        <div class="movie-view-container" id="movieView" style="display: none;">
            <button class="back-btn" onclick="window.location.href='/'">← На головну</button>
            <div class="movie-details">
                <div class="movie-poster">
                    <img id="viewPoster" src="" alt="Постер">
                </div>
                <div class="movie-info">
                    <h1 id="viewTitle"></h1>
                    <p class="movie-meta"><span id="viewYear"></span> | <span id="viewGenre"></span></p>
                    <p class="movie-rating">Рейтинг: ⭐ <span id="viewRating"></span></p>
                    <p class="movie-description" id="viewDescription"></p>
                    
                    <!-- Секція коментарів -->
                    <div class="comments-section">
                        <h2>Коментарі</h2>
                        
                        <!-- Форма додавання коментаря -->
                        <div class="comment-form" id="commentForm" style="display: none;">
                            <input type="hidden" id="editingReviewId" value="">
                            <textarea id="commentText" placeholder="Напишіть ваш коментар..." rows="3"></textarea>
                            <div class="comment-rating">
                                <label>Оцінка:</label>
                                <select id="commentRating">
                                    <option value="5">5 - Чудово</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>
                                    <option value="0" selected>0 - Без оцінки</option>
                                </select>
                            </div>
                            <button type="button" class="btn-primary" id="commentSubmitBtn" onclick="addComment()">Додати коментар</button>
                            <button type="button" class="btn-secondary" id="cancelEditBtn" onclick="cancelEdit()" style="display: none;">Скасувати</button>
                        </div>
                        
                        <!-- Список коментарів -->
                        <div class="comments-list" id="commentsList">
                            <!-- Коментарі будуть завантажені через JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Режим редагування/додавання фільму -->
        <div class="movie-form-container" id="movieFormContainer">
            <button class="back-btn" onclick="window.location.href='/'">← На головну</button>
            <h1 id="formTitle">Додавання фільму</h1>
            
            <form id="movieForm">
                <div class="input-group">
                    <label for="movieTitle">Назва фільму</label>
                    <input type="text" id="movieTitle" required>
                </div>
                
                <div class="input-group">
                    <label for="movieYear">Рік</label>
                    <input type="number" id="movieYear" required min="1900" max="2100">
                </div>
                
                <div class="input-group">
                    <label for="movieGenre">Жанр</label>
                    <select id="movieGenre" required>
                        <option value="">Оберіть жанр</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="movieRating">Рейтинг</label>
                    <input type="number" id="movieRating" required min="0" max="10" step="0.1" value="0">
                </div>
                
                <div class="input-group">
                    <label for="movieDescription">Опис</label>
                    <textarea id="movieDescription" rows="4"></textarea>
                </div>
                
                <div class="input-group">
                    <label for="moviePoster">Постер (URL)</label>
                    <input type="text" id="moviePoster" placeholder="https://example.com/poster.jpg">
                </div>
                
                <div class="input-group">
                    <label>Або завантажте постер</label>
                    <input type="file" id="moviePosterFile" accept="image/*">
                </div>
                
                <div class="poster-preview" id="posterPreview"></div>
                
                <button type="submit" class="btn-primary btn-full" id="saveBtn">Зберегти</button>
            </form>
        </div>
    </main>

    <div id="overlay" class="overlay" onclick="toggleProfilePanel()"></div>

    <aside id="profilePanel" class="profile-panel">
        <div class="panel-header">
            <h2>Мій Профіль</h2>
            <button class="close-btn" onclick="toggleProfilePanel()">&times;</button>
        </div>

        <div class="panel-body">
            <form id="updateProfileForm">
                <div class="input-group">
                    <label>Ім'я</label>
                    <input type="text" id="profileName" value="">
                </div>
                <div class="input-group">
                    <label>Пошта</label>
                    <input type="email" id="profileEmail" value="" disabled>
                </div>
                <div class="input-group">
                    <label>Новий пароль</label>
                    <input type="password" id="profilePassword" placeholder="Залишіть пустим, якщо не змінюєте">
                </div>
                <button type="submit" class="btn-primary btn-full">Зберегти зміни</button>
            </form>
        </div>


        <div class="panel-footer">
            <button id="logout-btn" class="btn-outline btn-full" onclick="logout()">Вийти з акаунту</button>
            <button id="delete-account-btn" class="btn-danger btn-full" onclick="deleteAccount()">🗑 Видалити акаунт</button>
        </div>
    </aside>

    <script src="profile.js"></script>
    <script src="movie.js"></script>
</body>
</html>
